# wii-gb-operator settings
# Copy to: sd:/apps/wii-gb-operator/settings.ini

# Display scale for GBA games without a custom border (240x160 native).
# 0.0 = fill screen (aspect-correct letterbox/pillarbox)
# 0.8 = centred at 80% of screen (default)
# 1.0 = fill screen without aspect correction
scale_gba=0.8

# Display scale for GBA games when a custom border is active (320x240 canvas).
# 1.0 = fill screen (recommended — border is designed for full screen)
scale_gba_border=1.0

# Display scale for GB/GBC games (160x144 native, or 256x224 with SGB border).
scale_gb=1.1

# Developer menu visibility.
# 0 = hidden (default) — shows the standard player-facing frontend only
# 1 = developer mode — adds a "Developer Menu" option to the frontend that
#     exposes raw dump/upload commands, cart detection, and log management
dev_menu=0
